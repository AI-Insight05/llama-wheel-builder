name: build-cpu-wheel-hf

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  contents: write   # needed to upload assets to a GitHub Release

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout llama-cpp-python source
        uses: actions/checkout@v4
        with:
          repository: abetlen/llama-cpp-python
          submodules: recursive
          # Pin to a specific release tag for reproducibility.
          # Update this tag whenever you want a newer llama-cpp-python version.
          ref: v0.3.20

      - name: Set up Python (runs cibuildwheel; target is cp311)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install cibuildwheel
        run: |
          python -m pip install -U pip
          python -m pip install -U cibuildwheel

      - name: Build wheel (CPU-only, no auditwheel repair)
        env:
          # Target only the CPython 3.11 manylinux x86_64 ABI — matches
          # the python:3.11-slim Docker image used on HF Spaces.
          CIBW_BUILD: "cp311-manylinux_x86_64"
          CIBW_SKIP: "*-musllinux_*"
          # Disable auditwheel repair so the wheel stays slim and doesn't
          # bundle glibc symbols that can cause conflicts inside the Space.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: ""
          CIBW_ENVIRONMENT_LINUX: >-
            CMAKE_ARGS="-DGGML_BLAS=OFF -DGGML_NATIVE=OFF -DGGML_OPENMP=OFF"
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheel as Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheelhouse
          path: wheelhouse/*.whl

      # Attach the wheel to the GitHub Release when triggered by a tag push.
      - name: Upload wheel to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: wheelhouse/*.whl
